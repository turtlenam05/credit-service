# --- Server Configuration ---
spring.application.name=credit-service
server.port=8082

# --- Database Configuration (Sửa lỗi Password & TimeZone) ---
# Thêm tham số options để ép Postgres dùng UTC, tránh lỗi Asia/Saigon
spring.datasource.url=jdbc:postgresql://localhost:5432/credit_db?options=-c%20timezone=UTC
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Ép Hibernate nhận diện đúng chuẩn PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Kafka (Disable để chạy app trước) ---
spring.kafka.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# --- Swagger / Open API ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# --- Encoding ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
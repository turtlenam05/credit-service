# --- Server Configuration ---
spring.application.name=credit-service
server.port=8082

# --- Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/credit_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Fix Kafka Error ---
# Thay vì exclude class, ta dùng lệnh tắt đơn giản này
spring.kafka.bootstrap-servers=localhost:9092

# --- Fix Deprecated Encoding (Bản mới dùng 'force-response') ---
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8

# --- Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html